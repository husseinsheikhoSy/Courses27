<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#030712" />
  <title>Premium Course Access</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://w.tads.me/widget.js"></script>

  <style>
    :root {
      /* Default fallback colors */
      --tg-bg: #030712;
      --tg-card-bg: rgba(17, 24, 39, 0.85);
      --tg-text: #f9fafb;
      --tg-hint: #9ca3af;
      --tg-button: #8b5cf6;
      --tg-button-text: #ffffff;
      --tg-success: #10b981;
      --tg-border: rgba(255, 255, 255, 0.12);
      --tg-glow: rgba(139, 92, 246, 0.25);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--tg-bg);
      background-image: 
        radial-gradient(circle at 20% 0%, rgba(139, 92, 246, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 80% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 45%);
      color: var(--tg-text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--tg-card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--tg-border);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.45);
      text-align: center;
      position: relative;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139, 92, 246, 0.12);
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      color: var(--tg-button);
      margin-bottom: 20px;
      border: 1px solid rgba(139, 92, 246, 0.25);
      transition: all 0.3s ease;
    }
    
    .status-badge.success {
      background: rgba(16, 185, 129, 0.12);
      color: var(--tg-success);
      border-color: rgba(16, 185, 129, 0.25);
    }

    .timer-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-circle {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--tg-border);
    }

    .timer-text {
      font-size: 36px;
      font-weight: 800;
      color: var(--tg-text);
      text-shadow: 0 0 24px var(--tg-glow);
      font-variant-numeric: tabular-nums;
    }

    .icon-display {
      position: absolute;
      font-size: 48px;
      display: none;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes scaleIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to { transform: scale(1) rotate(0); opacity: 1; }
    }

    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid var(--tg-button);
      border-radius: 50%;
      animation: ripple 2s infinite ease-out;
      opacity: 0;
    }
    
    @keyframes ripple {
      0% { transform: scale(0.8); opacity: 0.6; }
      50% { opacity: 0.3; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
      line-height: 1.3;
    }
    
    p {
      color: var(--tg-hint);
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      background: var(--tg-button);
      color: var(--tg-button-text);
      box-shadow: 0 8px 16px -4px rgba(139, 92, 246, 0.35);
    }
    
    .btn:active { transform: scale(0.985); }
    .btn:disabled {
      background: var(--tg-border);
      color: var(--tg-hint);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 8px 16px -4px rgba(16, 185, 129, 0.35);
      display: none;
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 8px 16px -4px rgba(99, 102, 241, 0.35);
      display: none;
    }

    .progress-container {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      margin-top: 18px;
      overflow: hidden;
      display: none;
    }
    
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--tg-button), #a78bfa);
      border-radius: 10px;
      transition: width 0.2s linear;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 11px;
      color: var(--tg-hint);
      opacity: 0.7;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    /* Telegram-specific optimizations */
    @media (max-width: 360px) {
      .container { padding: 24px 20px; border-radius: 24px; }
      h1 { font-size: 20px; }
      .timer-wrapper { width: 100px; height: 100px; }
      .timer-text { font-size: 32px; }
    }

    /* Smooth appearance animations */
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Hide scrollbar but allow scroll */
    ::-webkit-scrollbar { width: 0; height: 0; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>
<body>

<div class="container" id="main-card">
  <div class="status-badge" id="status-box">
    <span id="status-dot" style="width:7px; height:7px; background:var(--tg-button); border-radius:50%; display:inline-block;"></span>
    <span id="status-text">INITIALIZING</span>
  </div>

  <div class="timer-wrapper">
    <div class="pulse-ring" id="pulse-effect"></div>
    <div class="timer-circle">
      <span class="timer-text" id="countdown">3</span>
      <span class="icon-display" id="success-icon">🎓</span>
      <span class="icon-display" id="ad-icon">🎬</span>
    </div>
  </div>

  <h1 id="title" class="fade-in">Verifying Connection</h1>
  <p id="description" class="fade-in" style="animation-delay: 0.1s">Checking for available offers...</p>

  <button class="btn" id="btn-watch" onclick="handleWatchAd()" disabled style="display:none;">
    <span id="btn-text">Watch Ad to Unlock</span>
  </button>

  <button class="btn btn-secondary" id="btn-next-phase" onclick="startPhase2()" style="display:none;">
    <span>🔄</span> Go to Final Step
  </button>

  <button class="btn btn-success" id="btn-enroll" onclick="goToCourse()" style="display:none;">
    <span>🚀</span> ENROLL NOW FOR FREE
  </button>

  <div class="progress-container" id="progress-wrap">
    <div class="progress-fill" id="progress-bar"></div>
  </div>

  <div class="footer-note">
    <span>🛡️</span> Secure Verification by TADS
  </div>
</div>

<script>
  // 📱 Telegram WebApp Initialization
  const tg = window.Telegram?.WebApp || null;
  
  function initTelegram() {
    if (!tg) return;
    
    tg.ready();
    tg.expand?.();
    
    // Apply Telegram theme colors dynamically
    if (tg.themeParams) {
      const { 
        bg_color, text_color, hint_color, 
        button_color, button_text_color, secondary_bg_color 
      } = tg.themeParams;
      
      document.documentElement.style.setProperty('--tg-bg', bg_color || '#030712');
      document.documentElement.style.setProperty('--tg-text', text_color || '#f9fafb');
      document.documentElement.style.setProperty('--tg-hint', hint_color || '#9ca3af');
      document.documentElement.style.setProperty('--tg-button', button_color || '#8b5cf6');
      document.documentElement.style.setProperty('--tg-button-text', button_text_color || '#ffffff');
      document.documentElement.style.setProperty('--tg-card-bg', secondary_bg_color || 'rgba(17, 24, 39, 0.85)');
      
      // Update meta theme-color for better OS integration
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if (metaTheme) metaTheme.content = bg_color || '#030712';
    }
    
    // Enable native back button handling (optional)
    // tg.BackButton?.hide();
  }
  
  initTelegram();

  // ⚙️ TADS Configuration
  const WIDGET_ID = "9605";
  const AD_TYPE = "fullscreen";
  const IS_DEBUG = false;

  // ⏱️ Timer Settings
  const MAX_WAIT_SECONDS = 3;
  const CHECK_INTERVAL_MS = 300;

  // State Management
  let adController = null;
  let adUnlocked = false;
  let adReady = false;
  let adLoading = false;
  let checkAttempts = 0;
  let checkInterval = null;
  let preloadPromise = null;

  // Multi-Ad System
  const REQUIRED_ADS = 2;
  let adsWatched = 0;
  let currentPhase = 1;
  let phaseStartTime = null;

  // 🎯 TADS Callbacks
  const onShowRewardCallback = (result) => {
    console.log('✅ Ad completed:', result);
    onAdCompleted();
  };

  const onAdsNotFound = () => {
    console.log('⚠️ No ads found');
    handleNoAdAvailable();
  };

  const onAdError = (error) => {
    console.log('❌ Ad error:', error);
    handleNoAdAvailable();
  };

  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
    if (!code) return 'https://www.udemy.com/';
    try {
      const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
      return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
    } catch(e) { return 'https://www.udemy.com/'; }
  }
  const COURSE_URL = getCourseUrl();

  window.addEventListener('load', () => {
    phaseStartTime = Date.now();
    initializeTads();
    
    // Haptic feedback for better UX (if supported)
    if (tg?.HapticFeedback) {
      tg.HapticFeedback.impactOccurred('light');
    }
  });

  function initializeTads() {
    if (window.tads && typeof window.tads.init === 'function') {
      initAdController();
    } else {
      const tadsInterval = setInterval(() => {
        if (window.tads && typeof window.tads.init === 'function') {
          clearInterval(tadsInterval);
          initAdController();
        }
      }, 100);
      
      setTimeout(() => {
        clearInterval(tadsInterval);
        if (!adController) {
          console.warn('⚠️ TADS fallback mode');
          startAdCheckLoop();
        }
      }, 2000);
    }
  }

  function initAdController() {
    try {
      adController = window.tads.init({
        widgetId: WIDGET_ID,
        type: AD_TYPE,
        debug: IS_DEBUG,
        onShowReward: onShowRewardCallback,
        onAdsNotFound: onAdsNotFound,
        onError: onAdError
      });
      console.log('✅ TADS initialized');
      startAdCheckLoop();
    } catch(e) {
      console.warn('❌ TADS init failed:', e);
      startAdCheckLoop();
    }
  }

  function startAdCheckLoop() {
    checkAttempts = 0;
    checkInterval = setInterval(() => {
      checkAttempts++;
      const elapsed = Math.floor((Date.now() - phaseStartTime) / 1000);
      const secondsLeft = Math.max(0, MAX_WAIT_SECONDS - elapsed);
      
      if (!adReady && !adLoading) {
        document.getElementById('countdown').textContent = secondsLeft;
        document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • CHECKING`;
      }

      if (secondsLeft === 0 || adReady) {
        clearInterval(checkInterval);
        if (!adReady && !adLoading) {
          tryPreloadAd();
        }
        return;
      }

      if (!adLoading && !preloadPromise) {
        tryPreloadAd();
      }
    }, CHECK_INTERVAL_MS);
  }

  function tryPreloadAd() {
    if (!adController || adLoading) return;
    
    adLoading = true;
    preloadPromise = adController.loadAd()
      .then(() => {
        adReady = true;
        adLoading = false;
        preloadPromise = null;
        console.log('✅ Ad preloaded');
        
        document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • READY`;
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('ad-icon').style.display = 'flex';
        
        // Auto-launch if ad is ready
        if (adReady && !adUnlocked) {
          setTimeout(launchAd, 300);
        }
      })
      .catch((err) => {
        adLoading = false;
        preloadPromise = null;
        console.log('⚠️ Preload failed:', err);
      });
  }

  function handleNoAdAvailable() {
    clearInterval(checkInterval);
    adReady = true;
    
    if (currentPhase === 1) {
      showPhaseTransitionUI();
    } else {
      unlockDirectly();
    }
  }

  function resetPhase() {
    adReady = false;
    adUnlocked = false;
    adLoading = false;
    preloadPromise = null;
    checkAttempts = 0;
    phaseStartTime = Date.now();
    
    // Reset UI elements
    document.getElementById('countdown').style.display = 'flex';
    document.getElementById('countdown').textContent = MAX_WAIT_SECONDS;
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('success-icon').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('btn-next-phase').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'none';
    
    document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • CHECKING`;
    document.getElementById('title').textContent = `Preparing Phase ${currentPhase}...`;
    document.getElementById('description').textContent = `Checking for ad ${currentPhase} of ${REQUIRED_ADS}...`;
    
    clearInterval(checkInterval);
    startAdCheckLoop();
  }

  function launchAd() {
    if (adLoading) return;
    
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'flex';
    document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • PLAYING`;
    document.getElementById('title').textContent = `Watch Ad ${currentPhase} of ${REQUIRED_ADS}`;
    document.getElementById('description').textContent = 'Loading your sponsored video...';
    document.getElementById('progress-wrap').style.display = 'block';

    // Progress animation
    let p = 0;
    const pIv = setInterval(() => { 
      p += 4; 
      if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; 
    }, 120);

    if (adController && typeof adController.showAd === 'function') {
      adController.showAd()
        .then(() => {
          clearInterval(pIv);
          document.getElementById('progress-bar').style.width = '100%';
        })
        .catch(err => {
          clearInterval(pIv);
          handleAdError(err);
        });
    } else {
      clearInterval(pIv);
      onAdCompleted();
    }
  }

  function handleAdError(err) {
    const msg = String(err).toLowerCase();
    if (msg.includes('skip') || msg.includes('close') || msg.includes('cancel')) {
      document.getElementById('ad-icon').style.display = 'none';
      document.getElementById('countdown').style.display = 'flex';
      document.getElementById('countdown').textContent = '!';
      document.getElementById('status-text').textContent = 'AD SKIPPED';
      document.getElementById('title').textContent = 'Action Required!';
      document.getElementById('description').textContent = `Please watch ad ${currentPhase} to proceed.`;
      document.getElementById('progress-wrap').style.display = 'none';
      
      const btn = document.getElementById('btn-watch');
      btn.style.display = 'flex';
      btn.disabled = false;
      document.getElementById('btn-text').textContent = `▶ Watch Ad ${currentPhase}`;
      btn.onclick = () => handleWatchAd(currentPhase);
    } else {
      onAdCompleted();
    }
  }

  function onAdCompleted() {
    // Haptic feedback on completion
    if (tg?.HapticFeedback) {
      tg.HapticFeedback.notificationOccurred('success');
    }
    
    adsWatched++;
    if (adsWatched < REQUIRED_ADS) {
      showPhaseTransitionUI();
    } else {
      unlockDirectly();
    }
  }

  function showPhaseTransitionUI() {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'none';
    
    const nextBtn = document.getElementById('btn-next-phase');
    nextBtn.style.display = 'flex';
    nextBtn.disabled = false;
    
    document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • COMPLETE`;
    document.getElementById('title'].textContent = `✅ Phase ${currentPhase} Complete!`;
    document.getElementById('description').textContent = `Click below to proceed to the final step.`;
  }

  function startPhase2() {
    // Haptic feedback
    if (tg?.HapticFeedback) {
      tg.HapticFeedback.impactOccurred('medium');
    }
    
    document.getElementById('btn-next-phase').style.display = 'none';
    currentPhase = 2;
    resetPhase();
  }

  async function handleWatchAd(phase = currentPhase) {
    const btn = document.getElementById('btn-watch');
    btn.disabled = true;
    document.getElementById('btn-text').textContent = `Loading...`;
    document.getElementById('progress-wrap').style.display = 'block';

    let p = 0;
    const pIv = setInterval(() => { p += 4; if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; }, 120);

    try {
      if (adController) {
        await adController.loadAd();
        await adController.showAd();
      } else {
        clearInterval(pIv);
        onAdCompleted();
      }
    } catch (err) {
      clearInterval(pIv);
      handleAdError(err);
    }
  }

  function unlockDirectly() {
    adUnlocked = true;
    
    // Success animations
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('success-icon').style.display = 'flex';
    document.getElementById('pulse-effect').style.display = 'none';

    const statusBox = document.getElementById('status-box');
    const statusDot = document.getElementById('status-dot');
    statusBox.classList.add('success');
    statusDot.style.background = 'var(--tg-success)';
    
    document.getElementById('status-text').textContent = 'ACCESS GRANTED';
    document.getElementById('title').textContent = 'Ready to Begin!';
    document.getElementById('description').textContent = 'Verification complete. You now have full access.';

    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('btn-next-phase').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'flex';
    
    // Final haptic feedback
    if (tg?.HapticFeedback) {
      tg.HapticFeedback.notificationOccurred('success');
    }
  }

  function goToCourse() {
    // Haptic feedback before navigation
    if (tg?.HapticFeedback) {
      tg.HapticFeedback.impactOccurred('heavy');
    }
    
    if (tg?.openLink) { 
      tg.openLink(COURSE_URL); 
      setTimeout(() => tg.close?.(), 800); 
    } else {
      window.location.href = COURSE_URL;
    }
  }
</script>
</body>
</html>
