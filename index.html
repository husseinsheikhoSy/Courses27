<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#030712" />
  <title>Premium Course Access</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://w.tads.me/widget.js"></script>

  <style>
    :root {
      --tg-bg: #030712; --tg-card-bg: rgba(17, 24, 39, 0.9);
      --tg-text: #f9fafb; --tg-hint: #9ca3af; --tg-button: #8b5cf6;
      --tg-button-text: #ffffff; --tg-success: #10b981;
      --tg-border: rgba(255, 255, 255, 0.12); --tg-glow: rgba(139, 92, 246, 0.25);
      --btn-height: 56px; --btn-font: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body {
      background: var(--tg-bg);
      background-image: radial-gradient(circle at 20% 0%, rgba(139, 92, 246, 0.12) 0%, transparent 45%),
                        radial-gradient(circle at 80% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 45%);
      color: var(--tg-text); min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: calc(env(safe-area-inset-top) + 8px) 16px calc(env(safe-area-inset-bottom) + 8px);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .container {
      width: 100%; max-width: 420px;
      background: var(--tg-card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--tg-border); border-radius: 28px;
      padding: 28px 24px 24px; box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.45);
      text-align: center; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative; z-index: 1;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    
    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(139, 92, 246, 0.12); padding: 8px 16px; border-radius: 99px;
      font-size: 12px; font-weight: 600; color: var(--tg-button);
      margin-bottom: 20px; border: 1px solid rgba(139, 92, 246, 0.25);
    }
    .status-badge.success { background: rgba(16, 185, 129, 0.12); color: var(--tg-success); border-color: rgba(16, 185, 129, 0.25); }
    
    .timer-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
    .timer-circle {
      position: relative; width: 100%; height: 100%; border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--tg-border);
    }
    .timer-text { font-size: 36px; font-weight: 800; color: var(--tg-text); text-shadow: 0 0 24px var(--tg-glow); font-variant-numeric: tabular-nums; }
    .icon-display { position: absolute; font-size: 48px; display: none; animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes scaleIn { from { transform: scale(0) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
    .pulse-ring {
      position: absolute; width: 100%; height: 100%; border: 2px solid var(--tg-button); border-radius: 50%;
      animation: ripple 2s infinite ease-out; opacity: 0;
    }
    @keyframes ripple { 0% { transform: scale(0.8); opacity: 0.6; } 50% { opacity: 0.3; } 100% { transform: scale(1.6); opacity: 0; } }
    
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; line-height: 1.3; }
    p { color: var(--tg-hint); font-size: 14px; line-height: 1.55; margin-bottom: 24px; padding: 0 4px; }
    
    /* ✅ أزرار كبيرة وسهلة اللمس */
    .btn {
      width: 100%; 
      height: var(--btn-height);
      padding: 0 24px; 
      border-radius: 16px; 
      border: none;
      font-size: var(--btn-font); 
      font-weight: 600; 
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; 
      gap: 10px;
      transition: all 0.2s ease; 
      background: var(--tg-button); 
      color: var(--tg-button-text);
      box-shadow: 0 8px 16px -4px rgba(139, 92, 246, 0.35);
      margin-bottom: 12px;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { 
      background: var(--tg-border); 
      color: var(--tg-hint); 
      box-shadow: none; 
      cursor: not-allowed; 
      transform: none;
      opacity: 0.6;
    }
    .btn-success { 
      background: linear-gradient(135deg, #10b981, #059669); 
      box-shadow: 0 8px 16px -4px rgba(16, 185, 129, 0.35); 
      display: none; 
    }
    .btn-secondary { 
      background: linear-gradient(135deg, #6366f1, #4f46e5); 
      box-shadow: 0 8px 16px -4px rgba(99, 102, 241, 0.35); 
      display: none; 
    }
    
    .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 10px; margin-top: 18px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--tg-button), #a78bfa); border-radius: 10px; transition: width 0.2s linear; }
    .footer-note { margin-top: 24px; font-size: 11px; color: var(--tg-hint); opacity: 0.7; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    /* ✅ طبقة الحماية لمنع التفاعل أثناء الإعلان */
    #ad-overlay {
      position: fixed; inset: 0;
      background: rgba(3, 7, 18, 0.85);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none; /* يسمح بالمرور إلا عند التفعيل */
      transition: opacity 0.3s ease;
    }
    #ad-overlay.active {
      pointer-events: all; /* يمنع أي تفاعل */
    }
    .ad-lock-icon {
      font-size: 48px; margin-bottom: 16px;
      animation: pulseLock 1.5s ease-in-out infinite;
    }
    @keyframes pulseLock { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .ad-lock-text {
      color: var(--tg-hint); font-size: 14px; text-align: center;
      max-width: 80%; line-height: 1.4;
    }
    
    @media (max-width: 360px) { 
      .container { padding: 24px 20px; border-radius: 24px; } 
      h1 { font-size: 20px; } 
      .timer-wrapper { width: 100px; height: 100px; } 
      .timer-text { font-size: 32px; }
      :root { --btn-height: 52px; --btn-font: 15px; }
    }
    ::-webkit-scrollbar { width: 0; height: 0; } 
    * { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>
<body>

<!-- ✅ طبقة الحماية لمنع التخطي -->
<div id="ad-overlay">
  <div class="ad-lock-icon">🔒</div>
  <div class="ad-lock-text">Please watch the ad to continue.<br>Do not close this window.</div>
</div>

<div class="container" id="main-card">
  <div class="status-badge" id="status-box">
    <span id="status-dot" style="width:7px;height:7px;background:var(--tg-button);border-radius:50%;display:inline-block;"></span>
    <span id="status-text">INITIALIZING</span>
  </div>
  <div class="timer-wrapper">
    <div class="pulse-ring" id="pulse-effect"></div>
    <div class="timer-circle">
      <span class="timer-text" id="countdown">3</span>
      <span class="icon-display" id="success-icon">🎓</span>
      <span class="icon-display" id="ad-icon">🎬</span>
    </div>
  </div>
  <h1 id="title">Verifying Connection</h1>
  <p id="description">Checking for available offers...</p>
  
  <!-- ✅ جميع الأزرار معطلة افتراضيًا -->
  <button class="btn" id="btn-watch" onclick="handleWatchAd()" disabled style="display:none;"><span id="btn-text">Watch Ad to Unlock</span></button>
  <button class="btn btn-secondary" id="btn-next-phase" onclick="startPhase2()" disabled style="display:none;"><span>🔄</span> Go to Final Step</button>
  <button class="btn btn-success" id="btn-enroll" onclick="goToCourse()" disabled style="display:none;"><span>🚀</span> ENROLL NOW FOR FREE</button>
  
  <div class="progress-container" id="progress-wrap"><div class="progress-fill" id="progress-bar"></div></div>
  <div class="footer-note"><span>🛡️</span> Secure Verification by TADS</div>
</div>

<script>
/* =============================================
   📱 TELEGRAM SETUP - SAFE
   ============================================= */
const tg = window.Telegram?.WebApp || null;

function safeSetMainButton(params) {
  if (!tg?.MainButton) return;
  if (typeof tg.MainButton.setParams === 'function') {
    tg.MainButton.setParams(params);
  } else if (tg.MainButton.params) {
    Object.assign(tg.MainButton.params, params);
  }
}

function initTelegram() {
  if (!tg) { console.warn('⚠️ Running outside Telegram'); return; }
  tg.ready(); tg.expand?.();
  
  if (tg.themeParams) {
    const { bg_color, text_color, hint_color, button_color, button_text_color, secondary_bg_color } = tg.themeParams;
    if (bg_color) document.documentElement.style.setProperty('--tg-bg', bg_color);
    if (text_color) document.documentElement.style.setProperty('--tg-text', text_color);
    if (hint_color) document.documentElement.style.setProperty('--tg-hint', hint_color);
    if (button_color) document.documentElement.style.setProperty('--tg-button', button_color);
    if (button_text_color) document.documentElement.style.setProperty('--tg-button-text', button_text_color);
    if (secondary_bg_color) document.documentElement.style.setProperty('--tg-card-bg', secondary_bg_color);
  }
  
  if (tg.MainButton) {
    safeSetMainButton({
      color: tg.themeParams?.button_color || '#8b5cf6',
      text_color: tg.themeParams?.button_text_color || '#ffffff',
      is_visible: false
    });
    tg.MainButton.onClick(onMainButtonClick);
  }
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initTelegram);
else initTelegram();

/* =============================================
   ⚙️ APP CONFIG
   ============================================= */
const WIDGET_ID = "9605", REQUIRED_ADS = 2, IS_DEBUG = true;
let adController = null, adUnlocked = false, adsWatched = 0, currentPhase = 1, adIsPlaying = false;

function getCourseUrl() {
  const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
  if (!code) return 'https://www.udemy.com/';
  try {
    const decoded = atob(code.replace(/-/g,'+').replace(/_/g,'/'));
    return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
  } catch(e) { return 'https://www.udemy.com/'; }
}
const COURSE_URL = getCourseUrl();

/* =============================================
   🔐 UI LOCK/UNLOCK FUNCTIONS - لمنع التخطي
   ============================================= */
function lockUI() {
  adIsPlaying = true;
  // ✅ تعطيل جميع الأزرار في الصفحة
  document.querySelectorAll('.btn').forEach(btn => {
    btn.disabled = true;
    btn.style.pointerEvents = 'none';
  });
  // ✅ إخفاء/تعطيل MainButton
  if (tg?.MainButton) {
    tg.MainButton.params.is_active = false;
    tg.MainButton.hide();
  }
  // ✅ إظهار طبقة الحماية
  const overlay = document.getElementById('ad-overlay');
  overlay.style.display = 'flex';
  setTimeout(() => overlay.classList.add('active'), 10);
  // ✅ منع الإغلاق بالزر الخفي في تيليجرام (إن أمكن)
  tg?.disableVerticalSwipes?.();
  tg?.disableHorizontalSwipes?.();
}

function unlockUI() {
  adIsPlaying = false;
  // ✅ إعادة تفعيل الأزرار حسب المرحلة
  document.querySelectorAll('.btn').forEach(btn => {
    btn.disabled = false;
    btn.style.pointerEvents = 'auto';
  });
  // ✅ إخفاء طبقة الحماية
  const overlay = document.getElementById('ad-overlay');
  overlay.classList.remove('active');
  setTimeout(() => overlay.style.display = 'none', 300);
  // ✅ إعادة تفعيل السحب
  tg?.enableVerticalSwipes?.();
  tg?.enableHorizontalSwipes?.();
}

/* =============================================
   🎯 TADS CALLBACKS
   ============================================= */
const onShowRewardCallback = (result) => {
  console.log('✅ onShowReward:', result);
  unlockUI(); // ✅ فتح الواجهة بعد الانتهاء
  onAdCompleted();
};

const onAdsNotFoundCallback = () => {
  console.log('⚠️ onAdsNotFound');
  unlockUI();
  handleFallback('No ads');
};

/* =============================================
   ⏱️ COUNTDOWN → START
   ============================================= */
(function startCountdown() {
  let sec = 3;
  const el = document.getElementById('countdown');
  el.textContent = sec;
  const timer = setInterval(() => {
    sec--; el.textContent = sec;
    if (sec <= 0) { clearInterval(timer); startAdFlow(); }
  }, 1000);
})();

function startAdFlow() {
  document.getElementById('countdown').style.display = 'none';
  document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • CHECKING`;
  document.getElementById('title').textContent = 'Connecting...';
  document.getElementById('description').textContent = 'Looking for available ads...';
  
  // ✅ إخفاء كل الأزرار إلا ما يلزم
  hideAllButtons();
  updateMainButton('Checking ads...', false);
  
  waitForTads().then(() => initAdController()).catch(() => handleFallback('TADS timeout'));
}

function hideAllButtons() {
  document.getElementById('btn-watch').style.display = 'none';
  document.getElementById('btn-next-phase').style.display = 'none';
  document.getElementById('btn-enroll').style.display = 'none';
}

function waitForTads(timeout = 8000) {
  return new Promise((resolve, reject) => {
    if (window.tads && typeof window.tads.init === 'function') return resolve();
    const start = performance.now();
    const iv = setInterval(() => {
      if (window.tads && typeof window.tads.init === 'function') { clearInterval(iv); resolve(); }
      else if (performance.now() - start > timeout) { clearInterval(iv); reject(); }
    }, 100);
  });
}

/* =============================================
   🔧 INIT TADS
   ============================================= */
function initAdController() {
  try {
    adController = window.tads.init({
      widgetId: WIDGET_ID, type: 'fullscreen', debug: IS_DEBUG,
      onShowReward: onShowRewardCallback, onAdsNotFound: onAdsNotFoundCallback
    });
    console.log('✅ TADS initialized');
    loadAndShowAd();
  } catch (e) { console.error('❌ TADS init failed:', e); unlockUI(); handleFallback('Init error'); }
}

/* =============================================
   🎬 LOAD & SHOW AD - مع قفل الواجهة
   ============================================= */
function loadAndShowAd() {
  if (!adController) { unlockUI(); handleFallback('No controller'); return; }
  
  document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • LOADING`;
  document.getElementById('title').textContent = `Preparing Ad ${currentPhase}...`;
  
  // ✅ قفل الواجهة قبل التحميل
  lockUI();
  
  adController.loadAd()
    .then(() => {
      console.log('✅ Ad loaded');
      document.getElementById('ad-icon').style.display = 'flex';
      document.getElementById('status-text').textContent = `PHASE ${currentPhase}/${REQUIRED_ADS} • PLAYING`;
      document.getElementById('title').textContent = `Watch Ad ${currentPhase}/${REQUIRED_ADS}`;
      document.getElementById('description').textContent = 'Please watch the sponsored video...';
      document.getElementById('progress-wrap').style.display = 'block';
      
      let p = 0;
      const pIv = setInterval(() => { p += 3; if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; }, 150);
      
      const showResult = adController.showAd?.();
      if (showResult?.then) {
        showResult.then(() => { clearInterval(pIv); document.getElementById('progress-bar').style.width = '100%'; })
          .catch(() => { clearInterval(pIv); /* onShowReward will handle */ });
      } else { clearInterval(pIv); document.getElementById('progress-bar').style.width = '100%'; }
    })
    .catch((err) => {
      console.log('❌ Ad error:', err);
      unlockUI(); // ✅ فتح الواجهة في حالة الخطأ
      handleFallback('Load error');
    });
}

/* =============================================
   ✅ COMPLETED / FALLBACK
   ============================================= */
function onAdCompleted() {
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  adsWatched++;
  
  if (adsWatched < REQUIRED_ADS) {
    currentPhase = 2;
    showPhaseCompleteUI();
  } else {
    unlockDirectly();
  }
}

function handleFallback(reason) {
  console.warn('🔄 Fallback:', reason);
  document.getElementById('status-text').textContent = 'OFFLINE MODE';
  document.getElementById('title').textContent = 'Ad Unavailable';
  document.getElementById('description').textContent = 'No ads found. Proceeding directly.';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('ad-icon').style.display = 'none';
  
  hideAllButtons();
  document.getElementById('btn-next-phase').style.display = 'flex';
  updateMainButton('Continue →', true);
  
  setTimeout(() => {
    if (adsWatched < REQUIRED_ADS) { currentPhase = 2; showPhaseCompleteUI(); }
    else { unlockDirectly(); }
  }, 1500);
}

/* =============================================
   🎛️ UI FUNCTIONS
   ============================================= */
function showPhaseCompleteUI() {
  document.getElementById('status-text').textContent = `PHASE ${currentPhase-1}/${REQUIRED_ADS} • DONE`;
  document.getElementById('title').textContent = `✅ Phase ${currentPhase-1} Complete!`;
  document.getElementById('description').textContent = `Click below to proceed.`;
  
  hideAllButtons();
  const btn = document.getElementById('btn-next-phase');
  btn.style.display = 'flex';
  btn.disabled = false;
  updateMainButton(`Continue to Phase ${currentPhase} →`, true);
}

function startPhase2() {
  if (adIsPlaying) return; // ✅ منع النقر أثناء الإعلان
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
  
  hideAllButtons();
  adController = null;
  document.getElementById('countdown').style.display = 'flex';
  document.getElementById('countdown').textContent = '3';
  document.getElementById('ad-icon').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  
  let sec = 3; const el = document.getElementById('countdown');
  const timer = setInterval(() => {
    sec--; el.textContent = sec;
    if (sec <= 0) { clearInterval(timer); startAdFlow(); }
  }, 1000);
}

function unlockDirectly() {
  adUnlocked = true;
  document.getElementById('ad-icon').style.display = 'none';
  document.getElementById('success-icon').style.display = 'flex';
  document.getElementById('pulse-effect').style.display = 'none';
  
  document.getElementById('status-box').classList.add('success');
  document.getElementById('status-dot').style.background = 'var(--tg-success)';
  document.getElementById('status-text').textContent = 'ACCESS GRANTED';
  document.getElementById('title').textContent = 'Ready to Begin!';
  document.getElementById('description').textContent = 'Verification complete.';
  
  hideAllButtons();
  const btn = document.getElementById('btn-enroll');
  btn.style.display = 'flex';
  btn.disabled = false;
  updateMainButton('🚀 ENROLL NOW FOR FREE', true, true);
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function goToCourse() {
  if (adIsPlaying) return; // ✅ منع التخطي
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
  if (tg?.openLink) { tg.openLink(COURSE_URL); setTimeout(() => tg.close?.(), 800); }
  else window.location.href = COURSE_URL;
}

function updateMainButton(text, active, isGreen = false) {
  if (!tg?.MainButton) return;
  tg.MainButton.setText(text);
  safeSetMainButton({
    is_active: !!active && !adIsPlaying, // ✅ تعطيل أثناء الإعلان
    color: isGreen ? '#10b981' : (tg.themeParams?.button_color || '#8b5cf6')
  });
  if (!adIsPlaying) tg.MainButton.show();
}

function onMainButtonClick() {
  if (adIsPlaying) return; // ✅ حماية إضافية
  if (adUnlocked) { goToCourse(); return; }
  if (document.getElementById('btn-next-phase').style.display === 'flex') { startPhase2(); return; }
  if (adController && !adIsPlaying) loadAndShowAd();
  else handleFallback('Manual');
}

async function handleWatchAd() {
  if (adIsPlaying) return;
  const btn = document.getElementById('btn-watch');
  btn.disabled = true; document.getElementById('btn-text').textContent = 'Loading...';
  document.getElementById('progress-wrap').style.display = 'block';
  
  let p = 0; const pIv = setInterval(() => { p += 3; if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; }, 150);
  
  try {
    if (adController) {
      lockUI(); // ✅ قفل قبل العرض
      await adController.loadAd();
      await adController.showAd?.();
    } else { clearInterval(pIv); unlockUI(); onAdCompleted(); }
  } catch { clearInterval(pIv); unlockUI(); handleFallback('Watch error'); }
}
</script>
</body>
</html>
