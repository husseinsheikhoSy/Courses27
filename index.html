<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium Course Access</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.8);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --success: #10b981;
      --text-main: #f9fafb;
      --text-dim: #9ca3af;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden;
    }

    .container {
      width: 100%; max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      position: relative;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 14px; border-radius: 99px;
      font-size: 12px; font-weight: 600; color: var(--accent);
      margin-bottom: 20px; border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .timer-circle {
      position: relative; width: 100px; height: 100px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }

    .timer-text {
      font-size: 32px; font-weight: 800; color: var(--text-main);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .icon-display {
      font-size: 50px; display: none;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }

    h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
    p  { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    .btn {
      width: 100%; padding: 18px; border-radius: 20px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white; box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.5);
    }

    .btn-primary:disabled {
      background: #374151; color: #9ca3af; box-shadow: none; cursor: not-allowed;
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.5);
      display: none;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
      display: none;
    }

    .btn:active { transform: scale(0.97); }

    .progress-container {
      width: 100%; height: 6px; background: rgba(255,255,255,0.05);
      border-radius: 10px; margin-top: 20px; display: none;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 10px; transition: width 0.3s ease;
    }

    .footer-note {
      margin-top: 24px; font-size: 11px; color: var(--text-dim);
      opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    .pulse-ring {
      position: absolute; width: 100%; height: 100%;
      border: 2px solid var(--accent); border-radius: 50%;
      animation: ripple 2s infinite; opacity: 0;
    }
    @keyframes ripple {
      0%   { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* ── Tap Overlay ── */
    @keyframes fadeInOverlay { from{opacity:0} to{opacity:1} }
    @keyframes bounceHand { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes pulseCard  { 0%,100%{box-shadow:0 0 60px rgba(139,92,246,.2)} 50%{box-shadow:0 0 80px rgba(139,92,246,.4)} }
    @keyframes dot1 { 0%,100%{opacity:.3;transform:scale(.8)} 20%{opacity:1;transform:scale(1.2)} }
    @keyframes dot2 { 0%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.2)} }
    @keyframes dot3 { 0%,100%{opacity:.3;transform:scale(.8)} 60%{opacity:1;transform:scale(1.2)} }

    /* ── Responsive Design Improvements (3A) ── */
    @media (max-width: 320px) {
      .container { padding: 24px 16px; border-radius: 24px; }
      h1 { font-size: 20px; }
      p { font-size: 13px; }
      .btn { padding: 16px; font-size: 15px; }
      .timer-text { font-size: 28px; }
      .timer-circle { width: 90px; height: 90px; }
    }

    @media (min-width: 401px) {
      .container { max-width: 480px; }
    }

    /* ── Light Mode Support (3A) ── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --card-bg: rgba(255, 255, 255, 0.9);
        --text-main: #0f172a;
        --text-dim: #475569;
        --border: rgba(0, 0, 0, 0.1);
      }
      .status-badge { background: rgba(0, 0, 0, 0.05); }
      .chip { background: rgba(0, 0, 0, 0.04); border-color: rgba(0, 0, 0, 0.07); }
    }

    /* ── RTL Support for Arabic (3B) ── */
    [dir="rtl"] { text-align: right; }
    [dir="rtl"] .btn { flex-direction: row-reverse; }
    [dir="rtl"] .status-badge { flex-direction: row-reverse; }
  </style>
</head>
<body>

<!-- Full-screen tap overlay -->
<div id="tap-overlay" style="
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(3,7,18,0.92);
  backdrop-filter:blur(6px);
  cursor:pointer;
  animation:fadeInOverlay .4s ease;
" onclick="onFirstTap()">
  <div style="
    background:rgba(17,24,39,0.9);
    border:1px solid rgba(139,92,246,0.35);
    border-radius:28px;
    padding:36px 32px;
    text-align:center;
    max-width:320px;
    animation:pulseCard 2s ease-in-out infinite;
  ">
    <div style="font-size:52px; margin-bottom:16px; animation:bounceHand 1.4s ease-in-out infinite;">👆</div>
    <h2 style="font-size:20px; font-weight:800; color:#f9fafb; margin-bottom:10px; letter-spacing:-0.4px;" id="overlay-title">Tap to Continue</h2>
    <p style="font-size:13px; color:#9ca3af; line-height:1.6; margin:0;" id="overlay-desc">Tap anywhere to unlock your<br>free course access</p>
    <div style="margin-top:20px; display:flex; align-items:center; justify-content:center; gap:6px;">
      <span style="width:6px;height:6px;border-radius:50%;background:#8b5cf6;animation:dot1 1.2s ease-in-out infinite;display:block;"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#8b5cf6;animation:dot2 1.2s ease-in-out infinite;display:block;"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#8b5cf6;animation:dot3 1.2s ease-in-out infinite;display:block;"></span>
    </div>
  </div>
</div>

<div class="container" id="main-card">
  <div class="status-badge" id="status-box">
    <span id="status-dot" style="width:8px; height:8px; background:var(--accent); border-radius:50%"></span>
    <span id="status-text">SYSTEM INITIALIZING</span>
  </div>

  <div class="timer-circle">
    <div class="pulse-ring" id="pulse-effect"></div>
    <div class="timer-text" id="countdown">10</div>
    <div class="icon-display" id="success-icon">🎓</div>
    <div class="icon-display" id="ad-icon">🎬</div>
  </div>

  <h1 id="title">Verifying Connection</h1>
  <p id="description">We are searching for the best available offers to unlock your course for free.</p>

  <button class="btn btn-primary" id="btn-watch" onclick="handleWatchAd()" disabled style="display:none;">
    <span id="btn-text">Watch Ad to Unlock</span>
  </button>

  <button class="btn btn-secondary" id="btn-next-phase" onclick="startPhase2()">
    <span>🔄</span> <span id="next-btn-text">Go to Final Step</span>
  </button>

  <button class="btn btn-success" id="btn-enroll" onclick="goToCourse()">
    <span>🚀</span> <span id="enroll-text">ENROLL NOW FOR FREE</span>
  </button>

  <div class="progress-container" id="progress-wrap">
    <div class="progress-fill" id="progress-bar"></div>
  </div>

  <div class="footer-note">
    <span>🛡️</span> <span id="footer-text">Secure Verification by RichPartners</span>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  /* ── B) Telegram Mini App Detection ── */
  function isTelegramMiniApp() {
    return !!window.Telegram?.WebApp || 
           navigator.userAgent.includes('Telegram');
  }

  /* ── C) Network Quality Check ── */
  function checkNetworkQuality() {
    if ('connection' in navigator) {
      const type = navigator.connection.effectiveType;
      return type !== '2g' && type !== 'slow-2g';
    }
    return true;
  }

  /* ── 3B) Multi-Language Support ── */
  const translations = {
    'en': {
      overlayTitle: 'Tap to Continue',
      overlayDesc: 'Tap anywhere to unlock your<br>free course access',
      title1: 'Verifying Connection',
      desc1: 'We are searching for the best available offers to unlock your course for free.',
      btnWatch: 'Watch Ad to Unlock',
      btnNext: '🔄 Go to Final Step',
      btnEnroll: '🚀 ENROLL NOW FOR FREE',
      footer: 'Secure Verification by RichPartners',
      phaseWait: 'PHASE {n}/{total} - WAITING',
      phaseReady: 'PHASE {n}/{total} - AD READY',
      phaseComplete: 'PHASE {n}/{total} - COMPLETE',
      titlePhase: 'Preparing Phase {n}...',
      descPhase: 'Please wait {sec} seconds before watching ad {n} of {total}.',
      titleAd: 'Watch Ad {n} of {total}',
      descAd: 'Loading your sponsored video, please wait.',
      titleSkip: 'Action Required!',
      descSkip: 'Please watch the full ad {n} to proceed.',
      btnSkip: '▶ Watch Ad {n} to Continue',
      titleComplete: 'Ready to Begin!',
      descComplete: 'Verification complete. You now have full access to your course.',
      alertSkip: 'Please watch the full ad {n} to unlock your course access.',
      weakNet: 'Weak connection detected. Trying to load ad...'
    },
    'ar': {
      overlayTitle: 'اضغط للمتابعة',
      overlayDesc: 'اضغط في أي مكان لفتح الوصول<br>المجاني للكورس',
      title1: 'جاري التحقق من الاتصال',
      desc1: 'نبحث عن أفضل العروض المتاحة لفتح الكورس مجانًا.',
      btnWatch: 'شاهد الإعلان للفتح',
      btnNext: '🔄 انتقل للخطوة النهائية',
      btnEnroll: '🚀 سجّل الآن مجانًا',
      footer: 'تحقق آمن بواسطة RichPartners',
      phaseWait: 'المرحلة {n}/{total} - جاري الانتظار',
      phaseReady: 'المرحلة {n}/{total} - الإعلان جاهز',
      phaseComplete: 'المرحلة {n}/{total} - مكتملة',
      titlePhase: 'جاري تجهيز المرحلة {n}...',
      descPhase: 'يرجى الانتظار {sec} ثوانٍ قبل مشاهدة الإعلان {n} من {total}.',
      titleAd: 'شاهد الإعلان {n} من {total}',
      descAd: 'جاري تحميل الفيديو الدعائي، يرجى الانتظار.',
      titleSkip: 'إجراء مطلوب!',
      descSkip: 'يرجى مشاهدة الإعلان {n} كاملًا للمتابعة.',
      btnSkip: '▶ شاهد الإعلان {n} للمتابعة',
      titleComplete: 'جاهز للبدء!',
      descComplete: 'اكتمل التحقق. لديك الآن وصول كامل للكورس.',
      alertSkip: 'يرجى مشاهدة الإعلان {n} كاملًا لفتح الوصول للكورس.',
      weakNet: 'تم اكتشاف اتصال ضعيف. جاري محاولة تحميل الإعلان...'
    },
    'ru': {
      overlayTitle: 'Нажмите чтобы продолжить',
      overlayDesc: 'Нажмите в любом месте чтобы разблокировать<br>бесплатный доступ к курсу',
      title1: 'Проверка соединения',
      desc1: 'Мы ищем лучшие предложения для разблокировки вашего курса.',
      btnWatch: 'Смотреть рекламу',
      btnNext: '🔄 Перейти к финалу',
      btnEnroll: '🚀 ЗАПИСАТЬСЯ БЕСПЛАТНО',
      footer: 'Безопасная проверка RichPartners',
      phaseWait: 'ЭТАП {n}/{total} - ОЖИДАНИЕ',
      phaseReady: 'ЭТАП {n}/{total} - РЕКЛАМА ГОТОВА',
      phaseComplete: 'ЭТАП {n}/{total} - ЗАВЕРШЕНО',
      titlePhase: 'Подготовка этапа {n}...',
      descPhase: 'Подождите {sec} сек. перед просмотром рекламы {n} из {total}.',
      titleAd: 'Смотрите рекламу {n} из {total}',
      descAd: 'Загрузка спонсируемого видео, пожалуйста подождите.',
      titleSkip: 'Требуется действие!',
      descSkip: 'Пожалуйста, досмотрите рекламу {n} до конца.',
      btnSkip: '▶ Смотреть рекламу {n}',
      titleComplete: 'Готово к началу!',
      descComplete: 'Проверка завершена. У вас есть полный доступ к курсу.',
      alertSkip: 'Пожалуйста, досмотрите рекламу {n} для разблокировки.',
      weakNet: 'Слабое соединение. Попытка загрузки рекламы...'
    }
  };

  function getLang() {
    return tg?.initDataUnsafe?.user?.language_code || 
           navigator.language.split('-')[0] || 'en';
  }

  function t(key, params = {}) {
    const lang = getLang();
    let str = translations[lang]?.[key] || translations['en'][key] || key;
    // Replace placeholders like {n}, {total}, {sec}
    Object.keys(params).forEach(k => {
      str = str.replace(new RegExp(`\\{${k}\\}`, 'g'), params[k]);
    });
    return str;
  }

  function applyTranslations() {
    // RTL for Arabic
    if (getLang() === 'ar') {
      document.documentElement.setAttribute('dir', 'rtl');
      document.documentElement.setAttribute('lang', 'ar');
    }
    
    // Apply translations to elements
    document.getElementById('overlay-title').innerHTML = t('overlayTitle');
    document.getElementById('overlay-desc').innerHTML = t('overlayDesc');
    document.getElementById('title').innerText = t('title1');
    document.getElementById('description').innerText = t('desc1');
    document.getElementById('btn-text').innerText = t('btnWatch');
    document.getElementById('next-btn-text').innerText = t('btnNext').replace('🔄 ', '');
    document.getElementById('enroll-text').innerText = t('btnEnroll').replace('🚀 ', '');
    document.getElementById('footer-text').innerText = t('footer');
    
    // Telegram MainButton styling (B)
    if (isTelegramMiniApp() && tg?.MainButton) {
      tg.MainButton.setColor('#8b5cf6');
      tg.MainButton.setTextColor('#ffffff');
      tg.MainButton.setText(t('btnEnroll'));
    }
  }

  /* ── Multi-Ad System Config ── */
  let adsCtrl = null, adUnlocked = false, adReady = false, gestureDone = false;
  let checkAttempts = 0, checkInterval = null;
  const MAX_ATTEMPTS = 20, REQUIRED_ADS = 2, PHASE_DURATION = 10;
  let adsWatched = 0, currentPhase = 1, phaseStartTime = null;

  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
    if (!code) return 'https://www.udemy.com/';
    try {
      const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
      return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
    } catch(e) { return 'https://www.udemy.com/'; }
  }
  const COURSE_URL = getCourseUrl();

  function onFirstTap() {
    if (gestureDone) return;
    gestureDone = true;
    const overlay = document.getElementById('tap-overlay');
    if (overlay) {
      overlay.style.transition = 'opacity .3s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 320);
    }
    if (adReady && adsCtrl) launchAd();
  }

  window.addEventListener('load', () => {
    phaseStartTime = Date.now();
    applyTranslations(); // Apply translations on load
    
    if (typeof TelegramAdsController !== 'undefined') {
      try {
        adsCtrl = new TelegramAdsController();
        adsCtrl.initialize({ pubId: "1006337", appId: "6995" });
      } catch(e) { console.warn('Ads init failed:', e); }
    }
    checkInterval = setInterval(updateLogic, 500);
  });

  function updateLogic() {
    checkAttempts++;
    const elapsed = Math.floor((Date.now() - phaseStartTime) / 1000);
    const secondsLeft = Math.max(0, PHASE_DURATION - elapsed);
    
    if (!adUnlocked && secondsLeft > 0) {
      document.getElementById('countdown').innerText = secondsLeft;
      document.getElementById('status-text').innerText = t('phaseWait', { n: currentPhase, total: REQUIRED_ADS });
    }

    let isAvailable = false;
    if (secondsLeft === 0 && adsCtrl) {
      const checkFn = adsCtrl.isAdAvailable ?? adsCtrl.isReady ?? null;
      try { if (checkFn) isAvailable = checkFn.call(adsCtrl); } catch(e) {}
    }

    if (isAvailable && secondsLeft === 0 && !adReady) {
      adReady = true;
      clearInterval(checkInterval);
      if (gestureDone) launchAd();
      return;
    }

    if (checkAttempts >= MAX_ATTEMPTS && !adReady && secondsLeft === 0) {
      clearInterval(checkInterval);
      adReady = true;
      const overlay = document.getElementById('tap-overlay');
      if (overlay) {
        overlay.style.transition = 'opacity .3s ease';
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 320);
      }
      if (currentPhase === 1) showPhaseTransitionUI();
      else unlockDirectly();
    }
  }

  function resetPhase() {
    adReady = false; adUnlocked = false; checkAttempts = 0; phaseStartTime = Date.now();
    
    document.getElementById('countdown').style.display = 'block';
    document.getElementById('countdown').innerText = PHASE_DURATION;
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('success-icon').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('btn-next-phase').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'none';
    
    document.getElementById('status-text').innerText = t('phaseWait', { n: currentPhase, total: REQUIRED_ADS });
    document.getElementById('title').innerText = t('titlePhase', { n: currentPhase });
    document.getElementById('description').innerText = t('descPhase', { sec: PHASE_DURATION, n: currentPhase, total: REQUIRED_ADS });
    
    clearInterval(checkInterval);
    checkInterval = setInterval(updateLogic, 500);
  }

  function launchAd() {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'block';
    document.getElementById('status-text').innerText = t('phaseReady', { n: currentPhase, total: REQUIRED_ADS });
    document.getElementById('title').innerText = t('titleAd', { n: currentPhase, total: REQUIRED_ADS });
    document.getElementById('description').innerText = t('descAd');
    document.getElementById('progress-wrap').style.display = 'block';

    // C) Show weak connection warning
    if (!checkNetworkQuality()) {
      document.getElementById('description').innerText = t('weakNet');
    }

    let p = 0;
    const pIv = setInterval(() => { p += 2; if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; }, 200);

    // B+C) Fallback with timeout
    const AD_TIMEOUT = 15000;
    const timeout = setTimeout(() => {
      console.warn('Ad timeout — using fallback');
      clearInterval(pIv);
      onAdCompleted();
    }, AD_TIMEOUT);

    adsCtrl.show()
      .then(() => {
        clearTimeout(timeout);
        clearInterval(pIv);
        onAdCompleted();
      })
      .catch(err => {
        clearTimeout(timeout);
        clearInterval(pIv);
        const msg = String(err).toLowerCase();
        if (msg.includes('skip') || msg.includes('close')) {
          document.getElementById('ad-icon').style.display = 'none';
          document.getElementById('countdown').style.display = 'block';
          document.getElementById('countdown').innerText = '!';
          document.getElementById('status-text').innerText = 'AD SKIPPED';
          document.getElementById('title').innerText = t('titleSkip');
          document.getElementById('description').innerText = t('descSkip', { n: currentPhase });
          document.getElementById('progress-wrap').style.display = 'none';
          const btn = document.getElementById('btn-watch');
          btn.style.display = 'flex';
          btn.disabled = false;
          document.getElementById('btn-text').innerText = t('btnSkip', { n: currentPhase });
          btn.onclick = () => handleWatchAd(currentPhase);
        } else {
          onAdCompleted();
        }
      });
  }

  function onAdCompleted() {
    adsWatched++;
    if (adsWatched < REQUIRED_ADS) showPhaseTransitionUI();
    else unlockDirectly();
  }

  function showPhaseTransitionUI() {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'none';
    
    const nextBtn = document.getElementById('btn-next-phase');
    nextBtn.style.display = 'flex';
    nextBtn.disabled = false;
    
    document.getElementById('status-text').innerText = t('phaseComplete', { n: currentPhase, total: REQUIRED_ADS });
    document.getElementById('title').innerText = `✅ ${t('phaseComplete', { n: currentPhase, total: REQUIRED_ADS }).split(' - ')[0]}`;
    document.getElementById('description').innerText = getLang() === 'ar' 
      ? 'تقدم رائع! اضغط أدناه للمتابعة للخطوة النهائية وفتح الكورس.'
      : 'Great progress! Click below to proceed to the final step and unlock your course.';
  }

  function startPhase2() {
    document.getElementById('btn-next-phase').style.display = 'none';
    currentPhase = 2;
    resetPhase();
  }

  async function handleWatchAd(phase = currentPhase) {
    const btn = document.getElementById('btn-watch');
    btn.disabled = true;
    document.getElementById('btn-text').innerText = t('btnWatch');
    document.getElementById('progress-wrap').style.display = 'block';

    let p = 0;
    const pIv = setInterval(() => { p += 2; if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; }, 200);

    try {
      await adsCtrl.show();
      clearInterval(pIv);
      onAdCompleted();
    } catch (err) {
      clearInterval(pIv);
      const msg = String(err).toLowerCase();
      if (msg.includes('skip') || msg.includes('close')) {
        btn.disabled = false;
        document.getElementById('btn-text').innerText = t('btnSkip', { n: phase });
        document.getElementById('progress-wrap').style.display = 'none';
        alert(t('alertSkip', { n: phase }));
      } else {
        onAdCompleted();
      }
    }
  }

  function unlockDirectly() {
    adUnlocked = true;
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('success-icon').style.display = 'block';
    document.getElementById('pulse-effect').style.display = 'none';

    document.getElementById('status-text').innerText = 'ACCESS GRANTED';
    document.getElementById('status-dot').style.background = 'var(--success)';
    document.getElementById('status-box').style.borderColor = 'var(--success)';
    document.getElementById('status-box').style.color = 'var(--success)';

    document.getElementById('title').innerText = t('titleComplete');
    document.getElementById('description').innerText = t('descComplete');

    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('btn-next-phase').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'flex';
    
    // Update Telegram MainButton if available
    if (tg?.MainButton) {
      tg.MainButton.show();
      tg.MainButton.onClick(goToCourse);
    }
  }

  function goToCourse() {
    if (tg?.openLink) { tg.openLink(COURSE_URL); setTimeout(() => tg.close(), 1000); }
    else window.location.href = COURSE_URL;
  }
</script>
</body>
</html>
