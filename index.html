<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Free Course Access</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        var(--tg-theme-bg-color,          #0b0b14);
      --card:      var(--tg-theme-secondary-bg-color, #13131f);
      --surface:   #1c1c2e;
      --text:      var(--tg-theme-text-color,         #f0f0ff);
      --hint:      var(--tg-theme-hint-color,         #8888aa);
      --accent:    #7c6bff;
      --accent2:   #a78bfa;
      --green:     #10b981;
      --green2:    #34d399;
      --border:    rgba(124,107,255,0.15);
      --radius:    20px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      animation: fadeUp .35s ease;
    }
    .screen.active { display: flex; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading ── */
    .loader-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .spinner-ring {
      width: 56px; height: 56px;
      border: 3px solid rgba(124,107,255,0.15);
      border-top-color: var(--accent);
      border-right-color: var(--accent2);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--hint); font-size: 13px; letter-spacing: 0.3px; }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header-badge {
      background: rgba(124,107,255,0.12);
      border: 1px solid rgba(124,107,255,0.25);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .course-icon {
      width: 72px; height: 72px;
      background: rgba(124,107,255,0.1);
      border: 1px solid rgba(124,107,255,0.2);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
    }

    .card h2 {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider { width: 100%; height: 1px; background: var(--border); }

    .steps-wrap { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .steps-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--hint); }
    .steps { display: flex; gap: 6px; width: 100%; }
    .step { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; }
    .step.done   { background: var(--accent); }
    .step.active { background: var(--accent); animation: pulsebar 1.4s ease-in-out infinite; }
    @keyframes pulsebar { 0%,100%{opacity:1} 50%{opacity:.45} }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--hint);
    }
    .chip strong { color: var(--text); font-weight: 600; }

    .notice {
      width: 100%;
      background: rgba(124,107,255,0.07);
      border: 1px solid rgba(124,107,255,0.2);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 12px;
      color: var(--hint);
      line-height: 1.7;
      text-align: left;
      display: flex;
      gap: 10px;
    }
    .notice-icon { font-size: 16px; flex-shrink: 0; }

    .btn-watch {
      width: 100%; padding: 16px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, #7c6bff 0%, #a855f7 100%);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 6px 28px rgba(124,107,255,0.35);
      transition: transform .15s, opacity .2s;
    }
    .btn-watch:disabled { opacity: .35; cursor: not-allowed; background: rgba(255,255,255,0.07); box-shadow: none; }

    .btn-enroll {
      width: 100%; padding: 16px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); background: rgba(255,255,255,0.04);
      color: var(--hint); font-size: 15px; font-weight: 700;
      cursor: not-allowed; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-enroll.unlocked {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      border-color: transparent; color: #fff; cursor: pointer;
      box-shadow: 0 6px 28px rgba(16,185,129,0.35);
      animation: popIn .4s cubic-bezier(0.34,1.56,0.64,1);
    }
  </style>
</head>
<body>

<div id="s-loading" class="screen active">
  <div class="loader-wrap">
    <div class="spinner-ring"></div>
    <p class="loading-text" id="loading-msg">Initializing secure access...</p>
  </div>
</div>

<div id="s-main" class="screen">
  <div class="steps-wrap">
    <div class="steps-label">
      <span>Step 2 of 3</span>
      <span id="step-label-text">Verifying offer status...</span>
    </div>
    <div class="steps">
      <div class="step done"></div>
      <div class="step active" id="step2"></div>
      <div class="step" id="step3"></div>
    </div>
  </div>

  <div class="card">
    <div class="header-badge">100% Free Course</div>
    <div class="course-icon">🎓</div>
    <h2 id="main-title">Unlock Your Free Enrollment</h2>
    <div class="divider"></div>

    <div class="chips">
      <div class="chip"><span>Price: <strong style="color:#34d399">FREE</strong></span></div>
      <div class="chip"><span>Takes: <strong style="color:#34d399">~15 sec</strong></span></div>
    </div>

    <div class="notice">
      <span class="notice-icon">⚠️</span>
      <span id="notice-text">Please wait a few seconds while we check for available sponsored ads to unlock your course.</span>
    </div>

    <button class="btn-watch" id="btn-watch" onclick="handleWatchAd()" disabled>
      <span id="btn-watch-label">Checking Ads...</span>
    </button>

    <button class="btn-enroll" id="btn-enroll" disabled onclick="goToCourse()">
      <span id="lock-icon">🔒</span>
      <span id="enroll-label">Enroll Button — Locked</span>
    </button>

    <p style="font-size: 11px; color: var(--hint); opacity: .7;">Button activates automatically if no ads are found.</p>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  let adsCtrl = null;
  let adUnlocked = false;
  let checkAttempts = 0;
  let checkInterval = null;
  const MAX_ATTEMPTS = 14; // 14 * 500ms = 7 seconds

  // --- Utility: Get Course URL ---
  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
    if (!code) return 'https://www.udemy.com/';
    try {
      const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
      return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
    } catch(e) { return 'https://www.udemy.com/'; }
  }
  const COURSE_URL = getCourseUrl();

  // --- Ads Logic ---
  window.addEventListener('load', () => {
    // 1. تهيئة الـ SDK
    if (typeof TelegramAdsController !== 'undefined') {
      try {
        adsCtrl = new TelegramAdsController();
        adsCtrl.initialize({ pubId: "1006337", appId: "6995" });
      } catch(e) { console.error("Init error", e); }
    }
    
    // 2. بدء مؤقت الفحص (7 ثوانٍ)
    checkInterval = setInterval(verifyAdStatus, 500);
    
    // الانتقال للشاشة الرئيسية فوراً لبدء العد
    setTimeout(() => {
        document.getElementById('s-loading').classList.remove('active');
        document.getElementById('s-main').classList.add('active');
    }, 1000);
  });

  function verifyAdStatus() {
    checkAttempts++;
    
    // تحديث النص للمستخدم
    const timeLeft = Math.max(0, Math.ceil((MAX_ATTEMPTS - checkAttempts) / 2));
    if (!adUnlocked && timeLeft > 0) {
        document.getElementById('btn-watch-label').innerText = `Checking Ads (${timeLeft}s)...`;
    }

    // التحقق من توفر إعلان
    let isAvailable = false;
    if (adsCtrl) {
      const checkFn = adsCtrl.isAdAvailable ?? adsCtrl.isReady ?? null;
      try { isAvailable = checkFn.call(adsCtrl); } catch(e) {}
    }

    if (isAvailable) {
      clearInterval(checkInterval);
      enableWatchButton();
      return;
    }

    // إذا انتهى الوقت (7 ثوانٍ) ولم نجد إعلان
    if (checkAttempts >= MAX_ATTEMPTS) {
      clearInterval(checkInterval);
      unlockDirectly();
    }
  }

  function enableWatchButton() {
    const btn = document.getElementById('btn-watch');
    btn.disabled = false;
    document.getElementById('btn-watch-label').innerText = "▶ Watch Ad to Unlock";
    document.getElementById('step-label-text').innerText = "Ad ready! Watch to unlock";
    document.getElementById('notice-text').innerHTML = "A sponsored ad is ready. Watch it to <strong>unlock your course for free</strong>.";
  }

  async function handleWatchAd() {
    if (!adsCtrl || adUnlocked) return;
    
    const label = document.getElementById('btn-watch-label');
    label.innerText = "Loading Ad...";
    document.getElementById('btn-watch').disabled = true;

    try {
      await adsCtrl.show();
      unlockDirectly(); // نجاح المشاهدة
    } catch (err) {
      console.error("Ad failed", err);
      // في حال الخطأ أو الإغلاق، نقرر هل نفتح مباشرة أم نعيد المحاولة
      const errMsg = String(err).toLowerCase();
      if (errMsg.includes('skip') || errMsg.includes('close')) {
          label.innerText = "▶ Watch Ad to Unlock";
          document.getElementById('btn-watch').disabled = false;
          alert("Please watch the full ad to unlock the course.");
      } else {
          unlockDirectly(); // خطأ فني، نفتح الكورس تيسيراً للمستخدم
      }
    }
  }

  function unlockDirectly() {
    if (adUnlocked) return;
    adUnlocked = true;

    // تحديث الخطوات (Steps)
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step2').classList.add('done');
    document.getElementById('step3').classList.add('active');
    document.getElementById('step-label-text').innerText = "Access Granted";

    // إخفاء زر المشاهدة وتفعيل زر الدخول
    document.getElementById('btn-watch').style.display = 'none';
    const enrollBtn = document.getElementById('btn-enroll');
    enrollBtn.disabled = false;
    enrollBtn.classList.add('unlocked');
    
    document.getElementById('lock-icon').innerText = "🎓";
    document.getElementById('enroll-label').innerText = "Enroll Now — 100% FREE";
    document.getElementById('notice-text').innerText = "Success! Your course access has been unlocked. Click the green button below to start learning.";
  }

  function goToCourse() {
    if (!adUnlocked) return;
    if (tg?.openLink) {
      tg.openLink(COURSE_URL);
      setTimeout(() => tg.close(), 1000);
    } else {
      window.location.href = COURSE_URL;
    }
  }
</script>

</body>
</html>
